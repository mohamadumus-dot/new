  <!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Autovehicle</title>
  
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background-color: #f0f0f0;
      line-height: 1.6;
    }
  
    header {
      background-color: #222;
      color: #fff;
      padding: 20px;
      text-align: center;
    }
  
    main {
      max-width: 1200px;
      margin: 0 auto;
      padding: 20px;
    }
  
    h1 {
      text-align: center;
      margin-bottom: 30px;
      font-size: 2.5em;
      color: #222;
    }

    /* Раздел "Обзор моделей" и остальные */
    #overview-models {
      padding: 50px 20px;
      background-color: #fafafa;
    }

    #overview-models h2 {
      text-align: center;
      margin-bottom: 30px;
      font-size: 2.5em;
      color: #222;
    }

    .cards-container {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 20px;
    }

    .card {
      background: #fff;
      width: 300px;
      border-radius: 10px;
      box-shadow: 0 4px 8px rgba(0,0,0,0.1);
      overflow: hidden;
      transition: transform 0.3s, box-shadow 0.3s;
    }
    .card:hover {
      transform: translateY(-5px);
      box-shadow: 0 12px 24px rgba(0,0,0,0.2);
    }
    .card-img {
      width: 100%;
      height: 180px;
      object-fit: cover;
    }
    .card-content {
      padding: 15px;
    }
    .card-content h3 {
      margin-top: 0;
      font-size: 1.4em;
      color: #333;
    }
    .card-content p {
      font-size: 0.95em;
      line-height: 1.4;
      color: #555;
    }
    .btn {
      display: inline-block;
      margin-top: 10px;
      padding: 8px 12px;
      background-color: #007BFF;
      color: #fff;
      text-decoration: none;
      border-radius: 4px;
      font-weight: bold;
      transition: background-color 0.3s;
    }
    .btn:hover {
      background-color: #0056b3;
    }

    /* Новые разделы */
    section {
      margin-top: 50px;
      padding: 40px 20px;
    }

    /* Советы */
    #tips h2, #news h2, #contacts h2 {
      text-align: center;
      margin-bottom: 30px;
      font-size: 2em;
      color: #222;
    }

    /* Советы - список */
    #tips ul {
      max-width: 800px;
      margin: 0 auto;
      list-style-type: disc;
      padding-left: 20px;
    }
    #tips li {
      margin-bottom: 15px;
      font-size: 1.1em;
      color: #555;
    }

    /* Новости - карточки */
    .news-items {
      display: flex;
      flex-direction: column;
      max-width: 800px;
      margin: 0 auto;
      gap: 20px;
    }
    .news-item {
      background: #fff;
      padding: 15px;
      border-radius: 8px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }
    .news-item h3 {
      margin-top: 0;
      font-size: 1.4em;
      color: #333;
    }
    .news-item p {
      margin: 10px 0 0;
      font-size: 1em;
      color: #555;
    }

    /* Контакты */
    #contacts p {
      max-width: 800px;
      margin: 0 auto 20px;
      font-size: 1.2em;
      text-align: center;
    }
    /* Может быть форма или карта, добавляю пример простой контактной формы */
    #contact-form {
      max-width: 600px;
      margin: 0 auto;
    }
    #contact-form input, #contact-form textarea {
      width: 100%;
      padding: 10px;
      margin-bottom: 15px;
      border: 1px solid #ccc;
      border-radius: 4px;
    }
    #contact-form button {
      padding: 10px 20px;
      background-color: #28a745;
      color: #fff;
      border: none;
      border-radius: 4px;
      font-size: 1em;
      cursor: pointer;
    }
    #contact-form button:hover {
      background-color: #218838;
    }
  </style>
  
    <!-- Контакты -->
  <section id="contacts">
    <h2 style="text-align:center;">Контакты</h2>
    <p style="text-align:center;">Телефон: +7 123 456 78 90</p>
    <p style="text-align:center;">Адрес: г. Москва, ул. Автомобильная, д. 1</p>
    <p style="text-align:center;">Email: info@autosite.ru</p>
      
      <div id="contact-form">
        <h3>Оставить сообщение</h3>
        <form>
          <input type="text" placeholder="Ваше имя" required>
          <input type="email" placeholder="Ваш email" required>
          <textarea rows="4" placeholder="Ваше сообщение" required></textarea>
          <button type="submit">Отправить</button>
        </form>
      </div>
       <nav>
        <a href="Autovehicle.html" style="padding: 10px 20px; background-color: #004080; color: white; text-decoration: none; border-radius: 5px; font-weight: 600;">На главную</a>
       </nav>
    <!-- Можно вставить карту или форму для связи -->
  </section>
  </main>
